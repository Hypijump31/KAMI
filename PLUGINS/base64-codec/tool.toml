[tool]
id = "dev.kami.base64-codec"
name = "base64-codec"
version = "0.1.0"
wasm = "target/wasm32-wasip2/release/base64_codec.wasm"

[mcp]
description = "Encode or decode Base64 (standard and URL-safe variants)"

[[mcp.arguments]]
name = "action"
type = "string"
description = "Operation: encode or decode"
required = true

[[mcp.arguments]]
name = "data"
type = "string"
description = "Data to encode, or Base64 string to decode"
required = true

[[mcp.arguments]]
name = "url_safe"
type = "boolean"
description = "Use URL-safe Base64 alphabet (no padding). Default: false"
required = false

[security]
fs_access = "none"
max_memory_mb = 16
max_execution_ms = 1000
