[tool]
id = "dev.kami.url-parse"
name = "url-parse"
version = "0.1.0"
wasm = "target/wasm32-wasip2/release/url_parse.wasm"

[mcp]
description = "Parse URL components: scheme, host, port, path, query parameters, fragment"

[[mcp.arguments]]
name = "url"
type = "string"
description = "URL to parse or validate"
required = true

[[mcp.arguments]]
name = "action"
type = "string"
description = "Operation: parse (default) | validate | query_params"
required = false

[security]
fs_access = "none"
max_memory_mb = 16
max_execution_ms = 1000
